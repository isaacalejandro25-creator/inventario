<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte de Equipos - Escuela</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-in-out forwards; }
        .fade-out { animation: fadeOut 0.3s ease-in-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(10px); } }
        .custom-scrollbar::-webkit-scrollbar { height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 flex flex-col min-h-screen">

    <!-- Sistema de Notificaciones (Toast) -->
    <div id="toast" class="fixed bottom-6 right-6 px-5 py-3 rounded-lg shadow-xl z-50 text-white hidden flex items-center space-x-2 font-medium transition-all">
        <span id="toast-message">Mensaje</span>
    </div>

    <!-- Barra de Navegación -->
    <header class="bg-indigo-700 text-white shadow-lg sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="bg-indigo-600 p-2 rounded-lg">
                    <svg class="w-6 h-6 text-indigo-100" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                </div>
                <h1 class="text-xl font-bold tracking-tight">Reporte de Equipos</h1>
            </div>
            <div class="flex items-center space-x-4">
                <!-- Indicador Dinámico de Estado -->
                <span id="cloud-status" class="hidden sm:flex items-center text-xs font-medium bg-slate-800 px-3 py-1.5 rounded-full shadow-inner border border-slate-600">
                    <span id="cloud-dot" class="w-2 h-2 rounded-full bg-amber-400 mr-2 animate-pulse"></span>
                    <span id="cloud-text">Verificando conexión...</span>
                </span>
                
                <button onclick="window.copyUrl()" class="flex items-center space-x-2 bg-indigo-500 hover:bg-indigo-400 text-white px-4 py-2 rounded-lg transition shadow">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                    <span class="hidden sm:inline font-medium">Copiar Enlace</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Contenido Principal -->
    <main class="flex-grow w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- Tarjetas de Estadísticas -->
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-8">
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 flex items-center space-x-5">
                <div class="bg-blue-50 p-4 rounded-xl text-blue-600">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                </div>
                <div>
                    <p class="text-sm font-semibold text-slate-500 uppercase tracking-wider">Inventario Total</p>
                    <p id="stats-total" class="text-3xl font-bold text-slate-800 mt-1">0</p>
                </div>
            </div>
            
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 flex items-center space-x-5">
                <div class="bg-emerald-50 p-4 rounded-xl text-emerald-600">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
                <div>
                    <p class="text-sm font-semibold text-slate-500 uppercase tracking-wider">Disponibles</p>
                    <p id="stats-disponibles" class="text-3xl font-bold text-slate-800 mt-1">0</p>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 flex items-center space-x-5">
                <div class="bg-rose-50 p-4 rounded-xl text-rose-600">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
                <div>
                    <p class="text-sm font-semibold text-slate-500 uppercase tracking-wider">Vendidos</p>
                    <p id="stats-vendidos" class="text-3xl font-bold text-slate-800 mt-1">0</p>
                </div>
            </div>
        </div>

        <!-- Lista de Inventario -->
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="p-5 border-b border-slate-200 bg-slate-50/50 flex flex-col sm:flex-row justify-between items-start sm:items-center space-y-4 sm:space-y-0">
                <h2 class="text-lg font-bold text-slate-800 flex items-center">
                    <svg class="w-5 h-5 mr-2 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>
                    Detalle de Equipos
                </h2>
                <div class="flex space-x-2 bg-slate-200/50 p-1 rounded-lg">
                    <button id="filter-todos" onclick="window.setFilter('todos')" class="px-4 py-1.5 text-sm font-medium rounded-md bg-white text-indigo-700 shadow-sm transition">Todos</button>
                    <button id="filter-disponibles" onclick="window.setFilter('disponibles')" class="px-4 py-1.5 text-sm font-medium rounded-md text-slate-600 hover:text-slate-900 transition">Disponibles</button>
                    <button id="filter-vendidos" onclick="window.setFilter('vendidos')" class="px-4 py-1.5 text-sm font-medium rounded-md text-slate-600 hover:text-slate-900 transition">Vendidos</button>
                </div>
            </div>

            <!-- Tabla Escritorio -->
            <div class="hidden md:block overflow-x-auto custom-scrollbar">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50 border-b border-slate-200 text-slate-500 uppercase text-xs tracking-wider">
                        <tr>
                            <th class="p-4 font-semibold">Etiqueta ID</th>
                            <th class="p-4 font-semibold">Tipo de Equipo</th>
                            <th class="p-4 font-semibold">Ubicación</th>
                            <th class="p-4 font-semibold">Estado y Almacenaje</th>
                            <th class="p-4 font-semibold">Notas</th>
                            <th class="p-4 font-semibold text-center">Estatus</th>
                            <th class="p-4 font-semibold text-right">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="desktop-table-body" class="divide-y divide-slate-100 bg-white"></tbody>
                </table>
            </div>

            <!-- Tarjetas Móviles -->
            <div id="mobile-cards-container" class="md:hidden p-4 space-y-4 bg-slate-50"></div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, updateDoc, collection, onSnapshot, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // =====================================================================
        // ⚠️ PEGA AQUÍ TUS DATOS EXACTOS DE FIREBASE
        // =====================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyC6Mf3K3rYIgfZRT9CFYFK5Oj09ya8METM",
            authDomain: "computadoras-vendidas.firebaseapp.com",
            projectId: "computadoras-vendidas",
            storageBucket: "computadoras-vendidas.firebasestorage.app",
            messagingSenderId: "310530619079",
            appId: "1:310530619079:web:53fc73a3821ea854b3f0e2"
        };
        // =====================================================================

        // Los datos iniciales fijos
        const initialReportData = [];
        for(let i=1; i<=11; i++) initialReportData.push({ id_etiqueta: `PC-SALON-${String(i).padStart(2, '0')}`, tipo: 'Computadora', origen: 'Salones', almacenamiento: 'Sin almacenamiento', estado_fisico: 'Regular (Poca RAM, CPU viejo, INSERVIBLE)', notas: 'El SSD fue extraído y reubicado en equipos de Laboratorio para su VENTA', vendido: false });
        initialReportData.push({ id_etiqueta: `PC-SALON-12`, tipo: 'Computadora', origen: 'Salones', almacenamiento: 'Disco Duro (HDD)', estado_fisico: 'Operativa', notas: 'El equipo es obsoleto y muy lento. INSERVIBLE', vendido: false });
        for(let i=13; i<=16; i++) initialReportData.push({ id_etiqueta: `PC-SALON-${String(i).padStart(2, '0')}`, tipo: 'Computadora', origen: 'Salones', almacenamiento: 'HDD a punto de colapsar', estado_fisico: 'Inservible', notas: 'El equipo no funciona correctamente y no tiene reparación viable.', vendido: false });
        for(let i=1; i<=13; i++) initialReportData.push({ id_etiqueta: `TV-SALON-${String(i).padStart(2, '0')}`, tipo: 'Televisión 40"', origen: 'Salones', almacenamiento: 'N/A', estado_fisico: 'Operativa', notas: 'En buenas condiciones.', vendido: false });
        initialReportData.push({ id_etiqueta: `TV-SALON-14`, tipo: 'Televisión 40"', origen: 'Salones', almacenamiento: 'N/A', estado_fisico: 'Inservible', notas: 'Pantalla estrellada.', vendido: false });
        for(let i=1; i<=10; i++) initialReportData.push({ id_etiqueta: `PC-LAB-${String(i).padStart(2, '0')}`, tipo: 'Computadora', origen: 'Laboratorio', almacenamiento: 'SSD', estado_fisico: 'Excelente', notas: 'Actualizada exitosamente con el SSD extraído de los salones.', vendido: false });
        for(let i=11; i<=12; i++) initialReportData.push({ id_etiqueta: `PC-LAB-${String(i).padStart(2, '0')}`, tipo: 'Computadora', origen: 'Laboratorio', almacenamiento: 'HDD obsoleto', estado_fisico: 'Inservible', notas: 'No sirven, no vale la pena actualizar.', vendido: false });
        for(let i=13; i<=14; i++) initialReportData.push({ id_etiqueta: `PC-LAB-${String(i).padStart(2, '0')}`, tipo: 'Computadora', origen: 'Laboratorio', almacenamiento: 'HDD', estado_fisico: 'El equipo es obsoleto y muy lento. INSERVIBLE', notas: 'Se queda con HDD.', vendido: false });
        

        let equiposData = [...initialReportData];
        let currentFilter = 'todos';
        let db = null;
        let isCloudConnected = false;

        function isItemInservible(item) {
            const esInservible = item.estado_fisico.includes('Inservible') || item.estado_fisico.includes('estrellada');
            const esObsoleto = item.almacenamiento.includes('HDD') || item.almacenamiento.includes('Sin almacenamiento');
            return esInservible || esObsoleto;
        }


        // 1. Mostrar los datos de Inmediato (Adiós pantalla de carga)
        updateUIView();

        // 2. Intentar conexión a Firebase en Silencio
        try {
            const app = initializeApp(firebaseConfig);
            
            // Usamos el llamado estándar. Si falla por permisos o nombre, lo atraparemos más abajo.
            db = getFirestore(app);
            const equiposRef = collection(db, 'inventario_escuela');

            // Escuchar cambios de Firebase
            onSnapshot(equiposRef, (snapshot) => {
                if (snapshot.empty) {
                    console.log("Subiendo datos base...");
                    initialReportData.forEach(item => setDoc(doc(equiposRef, item.id_etiqueta), item));
                } else {
                    const tempArr = [];
                    snapshot.forEach(d => tempArr.push(d.data()));
                    tempArr.sort((a, b) => a.id_etiqueta.localeCompare(b.id_etiqueta));
                    equiposData = tempArr;
                    
                    // Actualizar el estado visual a Conectado
                    isCloudConnected = true;
                    updateCloudBadge('connected');
                    updateUIView();
                }
            }, (error) => {
                // Si la regla falla o la base de datos no se encuentra, entra modo local
                console.warn("Fallo Firebase. Pasando a modo local.", error);
                enableLocalFallback();
            });

        } catch (error) {
            // Si la configuración está vacía o tiene error de sintaxis
            console.warn("Error en configuración. Pasando a modo local.", error);
            enableLocalFallback();
        }

        function enableLocalFallback() {
            isCloudConnected = false;
            updateCloudBadge('local');
            
            // Intentar recuperar datos del LocalStorage si existen
            const localData = localStorage.getItem('inventarioLocal');
            if (localData) {
                equiposData = JSON.parse(localData);
                updateUIView();
            }
        }

        function updateCloudBadge(status) {
            const badge = document.getElementById('cloud-status');
            const dot = document.getElementById('cloud-dot');
            const text = document.getElementById('cloud-text');
            
            if (status === 'connected') {
                badge.className = "hidden sm:flex items-center text-xs font-medium bg-emerald-100 text-emerald-800 border-emerald-200 px-3 py-1.5 rounded-full shadow-sm";
                dot.className = "w-2 h-2 rounded-full bg-emerald-500 mr-2";
                text.innerText = "Nube Conectada";
            } else if (status === 'local') {
                badge.className = "hidden sm:flex items-center text-xs font-medium bg-slate-100 text-slate-600 border-slate-200 px-3 py-1.5 rounded-full shadow-sm";
                dot.className = "w-2 h-2 rounded-full bg-slate-400 mr-2";
                text.innerText = "Modo Offline / Local";
            }
        }

        window.toggleVendido = async function(id_etiqueta, nuevoEstado) {
            // 1. Actualizar interfaz inmediatamente para evitar demoras
            const itemIndex = equiposData.findIndex(e => e.id_etiqueta === id_etiqueta);
            if (itemIndex > -1) {
                equiposData[itemIndex].vendido = nuevoEstado;
                updateUIView();
            }

            // 2. Intentar guardar en la nube
            if (isCloudConnected && db) {
                try {
                    const docRef = doc(db, 'inventario_escuela', id_etiqueta);
                    await updateDoc(docRef, { vendido: nuevoEstado });
                    showToast(nuevoEstado ? "Venta guardada en la nube" : "Venta revertida en la nube", true);
                } catch (error) {
                    console.error("Error al actualizar en la nube:", error);
                    showToast("Error de nube. Guardando en local...", false);
                    localStorage.setItem('inventarioLocal', JSON.stringify(equiposData));
                }
            } else {
                // 3. Si está en modo local, guardar en el navegador
                localStorage.setItem('inventarioLocal', JSON.stringify(equiposData));
                showToast("Guardado localmente. La directora no verá este cambio.", false);
            }
        };

        function updateUIView() {
            const total = equiposData.length;
            const vendidos = equiposData.filter(e => e.vendido).length;
            
            document.getElementById('stats-total').innerText = total;
            document.getElementById('stats-disponibles').innerText = total - vendidos;
            document.getElementById('stats-vendidos').innerText = vendidos;
            
            let filtered = equiposData;
            if (currentFilter === 'disponibles') filtered = equiposData.filter(e => !e.vendido);
            if (currentFilter === 'vendidos') filtered = equiposData.filter(e => e.vendido);
            
            renderDesktopTable(filtered);
            renderMobileCards(filtered);
        }

        function getIcon(tipo) {
            if (tipo.includes('Televisión')) return `<div class="bg-indigo-100 p-2 rounded-lg text-indigo-600 mr-3"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg></div>`;
            return `<div class="bg-slate-200 p-2 rounded-lg text-slate-700 mr-3"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"></path></svg></div>`;
        }

        function renderDesktopTable(data) {
            const tbody = document.getElementById('desktop-table-body');
            tbody.innerHTML = '';
            
            if(data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" class="p-8 text-center text-slate-500">Sin resultados.</td></tr>`;
                return;
            }
            
            data.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-indigo-50/30 transition-colors";
                
                const isBroken = item.estado_fisico.includes('Inservible') || item.estado_fisico.includes('estrellada');
                const badge = isBroken ? `<span class="px-2 py-0.5 rounded text-xs bg-red-100 text-red-800">${item.estado_fisico}</span>` : `<span class="px-2 py-0.5 rounded text-xs bg-emerald-100 text-emerald-800">${item.estado_fisico}</span>`;
                const status = item.vendido ? `<span class="px-3 py-1 text-xs bg-rose-100 text-rose-700 rounded-full font-semibold">Vendido</span>` : `<span class="px-3 py-1 text-xs bg-emerald-100 text-emerald-700 rounded-full font-semibold">Disponible</span>`;
                const btn = item.vendido ? `<button onclick="window.toggleVendido('${item.id_etiqueta}', false)" class="text-xs px-3 py-1 bg-white border border-slate-300 rounded hover:bg-slate-50">Deshacer</button>` : `<button onclick="window.toggleVendido('${item.id_etiqueta}', true)" class="text-xs px-3 py-1 bg-indigo-600 text-white rounded hover:bg-indigo-700">Marcar Vendido</button>`;
                    
                tr.innerHTML = `<td class="p-4 font-bold text-slate-700">${item.id_etiqueta}</td><td class="p-4 flex items-center font-medium">${getIcon(item.tipo)} ${item.tipo}</td><td class="p-4 text-sm">${item.origen}</td><td class="p-4 text-sm">${badge}<div class="text-xs text-slate-500 mt-1">${item.almacenamiento}</div></td><td class="p-4 text-xs max-w-xs italic text-slate-600">${item.notas}</td><td class="p-4 text-center">${status}</td><td class="p-4 text-right">${btn}</td>`;
                tbody.appendChild(tr);
            });
        }

        function renderMobileCards(data) {
            const container = document.getElementById('mobile-cards-container');
            container.innerHTML = '';
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = `bg-white border ${item.vendido ? 'border-rose-200' : 'border-slate-200'} rounded-xl p-5 shadow-sm relative`;
                const isBroken = item.estado_fisico.includes('Inservible') || item.estado_fisico.includes('estrellada');
                const status = item.vendido ? `<span class="absolute top-5 right-5 px-2.5 py-1 text-[10px] uppercase font-bold bg-rose-100 text-rose-700 rounded-full">Vendido</span>` : `<span class="absolute top-5 right-5 px-2.5 py-1 text-[10px] uppercase font-bold bg-emerald-100 text-emerald-700 rounded-full">Disponible</span>`;
                const btn = item.vendido ? `<button onclick="window.toggleVendido('${item.id_etiqueta}', false)" class="w-full mt-4 text-sm py-2 bg-white border border-slate-300 rounded-lg">Deshacer</button>` : `<button onclick="window.toggleVendido('${item.id_etiqueta}', true)" class="w-full mt-4 text-sm py-2 bg-indigo-600 text-white rounded-lg font-semibold">Marcar Vendido</button>`;
                    
                card.innerHTML = `${status}<div class="text-[11px] text-indigo-500 font-black mb-2">${item.id_etiqueta}</div><div class="flex items-center mb-4">${getIcon(item.tipo)}<div><h3 class="font-bold text-slate-900">${item.tipo}</h3><p class="text-xs text-slate-500">${item.origen}</p></div></div><div class="bg-slate-50 p-3 rounded text-xs space-y-1"><p><b>Estado:</b> <span class="${isBroken ? 'text-red-600' : ''}">${item.estado_fisico}</span></p><p><b>Almacenaje:</b> ${item.almacenamiento}</p><p class="italic text-slate-500 mt-2">${item.notas}</p></div>${btn}`;
                container.appendChild(card);
            });
        }

        window.setFilter = function(status) {
            currentFilter = status;
            ['todos', 'disponibles', 'vendidos'].forEach(s => {
                const btn = document.getElementById(`filter-${s}`);
                btn.className = s === status ? "px-4 py-1.5 text-sm font-medium rounded-md bg-white text-indigo-700 shadow-sm transition" : "px-4 py-1.5 text-sm font-medium rounded-md text-slate-600 hover:text-slate-900 transition";
            });
            updateUIView();
        };

        window.copyUrl = function() {
            const input = document.createElement('input');
            document.body.appendChild(input);
            input.value = window.location.href;
            input.select();
            document.execCommand('copy');
            document.body.removeChild(input);
            showToast("Enlace copiado", true);
        };

        function showToast(message, isSuccess = true) {
            const toast = document.getElementById('toast');
            toast.className = `fixed bottom-6 right-6 px-5 py-3 rounded-lg shadow-xl z-50 text-white flex items-center space-x-2 font-medium fade-in ${isSuccess ? 'bg-emerald-600' : 'bg-amber-600'}`;
            toast.innerHTML = `<span id="toast-message">${message}</span>`;
            toast.classList.remove('hidden');
            setTimeout(() => {
                toast.classList.add('fade-out');
                setTimeout(() => { toast.classList.add('hidden'); toast.classList.remove('fade-out'); }, 300);
            }, 3000);
        }
    </script>
</body>
</html>
